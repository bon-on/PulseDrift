name: PulseDrift
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.junsikpark.PulseDrift
    SWIFT_VERSION: 5.10
targets:
  PulseDrift:
    type: application
    platform: iOS
    sources:
      - path: PulseDrift
    info:
      path: PulseDrift/Resources/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        TARGETED_DEVICE_FAMILY: 1
    scheme:
      testTargets:
        - PulseDriftTests
  PulseDriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PulseDriftTests
    dependencies:
      - target: PulseDrift
